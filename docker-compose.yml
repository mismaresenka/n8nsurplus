version: "3.8"

# ============================================================
# A&A Household Appliances Trading — n8n Self-Hosted Setup
# ============================================================
# Prerequisites:
#   - Docker + Docker Compose installed on the host machine
#   - A domain or subdomain pointed at this server (for HTTPS)
#   - Port 5678 open in your firewall/router
#
# Quick start:
#   1. Copy this file and the .env.example to your server
#   2. Fill in every value in .env (rename to .env before running)
#   3. Run: docker compose up -d
#   4. Visit https://<your-domain>:5678 to complete setup
# ============================================================

services:
  # ----------------------------------------------------------
  # n8n — workflow automation engine
  # ----------------------------------------------------------
  n8n:
    image: n8nio/n8n:latest # pin to a specific version in production, e.g. n8nio/n8n:1.45.1
    container_name: aa_n8n
    restart: unless-stopped # auto-restarts after server reboots

    ports:
      - "5678:5678" # n8n UI + webhook receiver

    environment:
      # ---- Core ----
      - N8N_HOST=${N8N_HOST} # e.g. n8n.yourdomain.com
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-https} # https recommended; use http only on localhost
      - WEBHOOK_URL=${WEBHOOK_URL} # full URL n8n uses to build webhook links
        # e.g. https://n8n.yourdomain.com/

      # ---- Auth (basic, single-user) ----
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}

      # ---- Database (Postgres — more reliable than SQLite at scale) ----
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}

      # ---- Encryption (protects stored credentials like API keys) ----
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY} # generate with: openssl rand -hex 32

      # ---- Timezone ----
      - GENERIC_TIMEZONE=Asia/Manila # PST / Panabo City

      # ---- Execution settings ----
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=last # keeps storage lean; change to 'all' for debugging
      - EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS=true
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=336 # prune executions older than 14 days (hours)

      # ---- Email notifications (for workflow error alerts) ----
      # n8n can send error emails; WhatsApp/Gmail nodes handle operator alerts
      - N8N_EMAIL_MODE=smtp
      - N8N_SMTP_HOST=${SMTP_HOST}
      - N8N_SMTP_PORT=${SMTP_PORT:-587}
      - N8N_SMTP_USER=${SMTP_USER}
      - N8N_SMTP_PASS=${SMTP_PASS}
      - N8N_SMTP_SENDER=${SMTP_SENDER}

      # ---- Disable telemetry (optional) ----
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_VERSION_NOTIFICATIONS_ENABLED=false

    volumes:
      - n8n_data:/home/node/.n8n # persists workflows, credentials, settings

    depends_on:
      postgres:
        condition: service_healthy # waits for Postgres to be ready before starting

    networks:
      - aa_pipeline

  # ----------------------------------------------------------
  # Postgres — persistent database for n8n workflow storage
  # ----------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: aa_postgres
    restart: unless-stopped

    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - aa_pipeline

# ----------------------------------------------------------
# Named volumes — data persists across container restarts
# ----------------------------------------------------------
volumes:
  n8n_data:
  postgres_data:

# ----------------------------------------------------------
# Internal network — containers talk to each other by name
# ----------------------------------------------------------
networks:
  aa_pipeline:
    driver: bridge
